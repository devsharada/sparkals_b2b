<div class="w-full bg-212121 mx-auto py-5 lg:py-10 px-2 lg:px-5 xl:px-16 sm:flex items-center gap-4 lg:gap-6">
  <div class="w-full sm:w-1/2 sm:mt-5 lg:mt-8 px-6 py-3">
    <!-- section title -->
    <h3 class="text-white capitalize font-normal text-lg/tight sm:text-2xl/tight lg:text-3xl/tight xl:text-6xl/tight">
      Why Choose Us</h3>
    <!-- why choose list -->
    <ul class="space-y-4 mt-6 lg:mt-12 list-disc pl-5 md:pl-10">
      <li *ngFor="let whychoose of whychooses"
        class="capitalize text-xs sm:text-base lg:text-lg xl:text-2xl text-white">
        {{ whychoose.title }}
      </li>
    </ul>
  </div>
  <div class="relative w-full sm:w-1/2 mt-5 sm:mt-0 px-10 lg:px-20 py-3">
    <!-- Navigation Buttons -->
    <div class="absolute left-0 lg:left-8 xl:left-10 top-1/2 -translate-y-1/2 z-10">
      <button
        class="cursor-pointer swiper-button-prev4 flex items-center justify-center text-xl sm:text-2xl bg-212121 text-white hover:shadow-md border border-0000002b hover:scale-110 p-1">
        <svg width="16" height="24" viewBox="0 0 14 25" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M11.2258 23.6955L0.354838 13.3602C0.225806 13.2372 0.134623 13.1039 0.08129 12.9604C0.0270964 12.8168 0 12.663 0 12.499C0 12.3349 0.0270964 12.1811 0.08129 12.0376C0.134623 11.894 0.225806 11.7607 0.354838 11.6377L11.2258 1.2717C11.5269 0.984609 11.9032 0.841064 12.3548 0.841064C12.8065 0.841064 13.1935 0.994863 13.5161 1.30246C13.8387 1.61006 14 1.96892 14 2.37905C14 2.78917 13.8387 3.14804 13.5161 3.45563L4.03226 12.499L13.5161 21.5423C13.8172 21.8294 13.9677 22.1829 13.9677 22.6029C13.9677 23.0237 13.8065 23.3879 13.4839 23.6955C13.1613 24.0031 12.7849 24.1569 12.3548 24.1569C11.9247 24.1569 11.5484 24.0031 11.2258 23.6955Z"
            fill="white" />
        </svg>
      </button>
    </div>
    <div class="absolute right-0 lg:right-8 xl:right-10 top-1/2 -translate-y-1/2 z-10">
      <button
        class="cursor-pointer swiper-button-next4  flex items-center justify-center text-xl sm:text-2xl bg-212121 text-white hover:shadow-md border border-0000002b hover:scale-110 p-1">
        <svg width="16" height="24" viewBox="0 0 14 25" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M2.77419 1.30355L13.6452 11.6388C13.7742 11.7618 13.8654 11.8951 13.9187 12.0387C13.9729 12.1822 14 12.336 14 12.5001C14 12.6641 13.9729 12.8179 13.9187 12.9615C13.8654 13.105 13.7742 13.2383 13.6452 13.3613L2.77419 23.7273C2.47312 24.0144 2.09677 24.158 1.64516 24.158C1.19355 24.158 0.806452 24.0042 0.483871 23.6966C0.16129 23.389 0 23.0301 0 22.62C0 22.2098 0.16129 21.851 0.483871 21.5434L9.96774 12.5001L0.483871 3.45673C0.182796 3.16964 0.0322571 2.8161 0.0322571 2.39613C0.0322571 1.97534 0.193548 1.61115 0.516129 1.30355C0.838709 0.995955 1.21505 0.842157 1.64516 0.842157C2.07527 0.842157 2.45161 0.995955 2.77419 1.30355Z"
            fill="white" />
        </svg>
      </button>
    </div>

    <swiper-container #swiperRef init="false">
      <!-- product card -->
      <swiper-slide *ngFor="let item of products1">
          <div class="w-full">
            <img class="w-full h-full mx-auto rounded-lg" [src]="item.image" [alt]="item.name">
          </div>
      </swiper-slide>
    </swiper-container>
  </div>

</div>
