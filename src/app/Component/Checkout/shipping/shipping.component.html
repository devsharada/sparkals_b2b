    <div class="flex items-center justify-between gap-2 lg:gap-4">
      <p class="text-323232 font-normal text-xs sm:text-base font-marcellus mt-2 text-center">Billing & Shipping</p>

      <p class="text-323232 font-normal text-xs sm:text-base font-marcellus mt-2 text-center">Payment Option</p>
      <p class="text-323232 font-normal text-xs sm:text-base font-marcellus mt-2 text-center">Review & Confirm</p>
    </div>

    <div class="mt-5 lg:mt-10">
      <p class="text-xl lg:text-2xl font-323232 font-normal font-marcellus">Payment Option</p>
      <div class="space-y-8 mt-6">
        <!-- Option 1 (default checked) -->
        <div>
          <label class="inline-flex items-center">
            <input type="radio" name="gender" value="male" class="form-radio h-5 w-5 text-green-500" checked>
            <span class="ml-2 text-323232 text-base lg:text-lg">Credit/Debit Card</span>
          </label>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mt-2">
            <div class="col-span-2">
              <div class="relative">
                <input type="text"
                  class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
                  placeholder=" " />
                <label
                  class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Card
                  Number</label>
              </div>
            </div>

            <div class="col-span-1 ">
              <div class="relative">
                <input type="text"
                  class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
                  placeholder=" " />
                <label
                  class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Expiry</label>
              </div>
            </div>

            <div class="col-span-1 ">
              <div class="relative">
                <input type="text"
                  class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
                  placeholder=" " />
                <label
                  class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">CVV</label>
              </div>
            </div>
          </div>
        </div>
        <!-- Option 2 -->
        <div>
          <label class="inline-flex items-center">
            <input type="radio" name="gender" value="male" class="form-radio h-5 w-5 text-green-500">
            <span class="ml-2 text-323232 text-base lg:text-lg">UPI / Wallets</span>
          </label>
          <div class="w-full flex items-center mt-2 border-1 border-c3c3c3 bg-white">
            <div class="relative w-1/2 lg:w-2/3">
              <input type="text"
                class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white   appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
                placeholder=" " />
              <label
                class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Card
                Number</label>
            </div>
            <div class="bg-white w-1/2 lg:w-1/3 flex items-center justify-end gap-1.5 py-3.5 sm:py-2 lg:py-2 px-3">
              <a routerLink="#"><img class="w-10" src="/assets/images/home/card1.png" alt="card"></a>
              <a routerLink="#"><img class="w-10" src="/assets/images/home/card2.png" alt="card"></a>
              <a routerLink="#"><img class="w-10" src="/assets/images/home/card3.png" alt="card"></a>
              <a routerLink="#"><img class="w-10" src="/assets/images/home/card4.png" alt="card"></a>
              <a routerLink="#"><img class="w-10" src="/assets/images/home/card5.png" alt="card"></a>
            </div>
          </div>

        </div>

        <!-- Option 3 -->
        <div>
          <label class="inline-flex items-center">
            <input type="radio" name="gender" value="male" class="form-radio h-5 w-5 text-green-500">
            <span class="ml-2 text-323232 text-base lg:text-lg">Net Banking</span>
          </label>
          <div class="relative mt-2">
            <select
              class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white border-1 border-c3c3c3 focus:outline-none focus:ring-0 focus:border-18ac67 peer">
              <option value="" disabled selected>Select Bank</option>
              <option value="maharashtra">State Bank Of India</option>
              <option value="karnataka">Axis Bank</option>
            </select>

            <label class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white px-2 peer-focus:px-2
           peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2
           peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 start-1">
              Bank
            </label>
          </div>
        </div>

        <div class="text-center mt-3">
          <button (click)="goNext()"
            class="hidden md:block mt-4 cursor-pointer w-max border border-323232 bg-323232 text-white text-lg md:text-xl py-2 px-10 rounded-md mx-auto hover:bg-white hover:text-323232 transition">
            Continue
          </button>
        </div>
      </div>
    </div>
  </div>
  <!-- order summary -->
  <div class="w-full md:w-2/5 bg-white p-4 sm:p-10 md:p-4 xl:py-16 xl:pr-22 xl:pl-16">
    <app-order-summary  (continue)="goNext()"></app-order-summary>
  </div>
</div>
