<div class="overflow-x-auto">
  <table class="min-w-full border border-d3d3d3 rounded-xl text-sm lg:text-base">
    <!-- Header -->
    <thead class="bg-f4f4f4 text-767676 text-left whitespace-nowrap">
      <tr>
        <th class="px-2 py-3" align="center">
          <input type="checkbox" class="w-4 h-4" />
        </th>
        <th class="px-2 py-3" align="center">Media</th>
        <th class="px-2 py-3">
          <p class="flex items-center gap-1.5">Prod ID <svg width="20px" height="20px" viewBox="0 0 24 24" fill="none"
              xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
              <g id="SVGRepo_iconCarrier">
                <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M16 5.25C16.2029 5.25 16.3972 5.33222 16.5384 5.47789L20.5384 9.60289C20.8268 9.90025 20.8195 10.3751 20.5221 10.6634C20.2247 10.9518 19.7499 10.9445 19.4616 10.6471L16.75 7.8508L16.75 18C16.75 18.4142 16.4142 18.75 16 18.75C15.5858 18.75 15.25 18.4142 15.25 18L15.25 7.8508L12.5384 10.6471C12.2501 10.9445 11.7753 10.9518 11.4779 10.6634C11.1805 10.3751 11.1732 9.90025 11.4616 9.60289L15.4616 5.47789C15.6028 5.33222 15.7971 5.25 16 5.25ZM8 5.25C8.41421 5.25 8.75 5.58579 8.75 6L8.75 16.1492L11.4616 13.3529C11.7499 13.0555 12.2247 13.0482 12.5221 13.3366C12.8195 13.6249 12.8268 14.0997 12.5384 14.3971L8.53843 18.5221C8.39717 18.6678 8.20291 18.75 8 18.75C7.79709 18.75 7.60283 18.6678 7.46158 18.5221L3.46158 14.3971C3.17322 14.0997 3.18053 13.6249 3.47789 13.3366C3.77526 13.0482 4.25007 13.0555 4.53843 13.3529L7.25 16.1492L7.25 6C7.25 5.58579 7.58579 5.25 8 5.25Z"
                  fill="#000000"></path>
              </g>
            </svg></p>
        </th>
        <th class="px-2 py-3">
          <p class="flex items-center gap-1.5">Prod Name<svg width="20px" height="20px" viewBox="0 0 24 24" fill="none"
              xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
              <g id="SVGRepo_iconCarrier">
                <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M16 5.25C16.2029 5.25 16.3972 5.33222 16.5384 5.47789L20.5384 9.60289C20.8268 9.90025 20.8195 10.3751 20.5221 10.6634C20.2247 10.9518 19.7499 10.9445 19.4616 10.6471L16.75 7.8508L16.75 18C16.75 18.4142 16.4142 18.75 16 18.75C15.5858 18.75 15.25 18.4142 15.25 18L15.25 7.8508L12.5384 10.6471C12.2501 10.9445 11.7753 10.9518 11.4779 10.6634C11.1805 10.3751 11.1732 9.90025 11.4616 9.60289L15.4616 5.47789C15.6028 5.33222 15.7971 5.25 16 5.25ZM8 5.25C8.41421 5.25 8.75 5.58579 8.75 6L8.75 16.1492L11.4616 13.3529C11.7499 13.0555 12.2247 13.0482 12.5221 13.3366C12.8195 13.6249 12.8268 14.0997 12.5384 14.3971L8.53843 18.5221C8.39717 18.6678 8.20291 18.75 8 18.75C7.79709 18.75 7.60283 18.6678 7.46158 18.5221L3.46158 14.3971C3.17322 14.0997 3.18053 13.6249 3.47789 13.3366C3.77526 13.0482 4.25007 13.0555 4.53843 13.3529L7.25 16.1492L7.25 6C7.25 5.58579 7.58579 5.25 8 5.25Z"
                  fill="#000000"></path>
              </g>
            </svg></p>
        </th>
        <th class="px-2 py-3" align="center">
          <p class="flex items-center justify-center gap-1.5">Carat<svg width="20px" height="20px" viewBox="0 0 24 24"
              fill="none" xmlns="http://www.w3.org/2000/svg">
              <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
              <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
              <g id="SVGRepo_iconCarrier">
                <path fill-rule="evenodd" clip-rule="evenodd"
                  d="M16 5.25C16.2029 5.25 16.3972 5.33222 16.5384 5.47789L20.5384 9.60289C20.8268 9.90025 20.8195 10.3751 20.5221 10.6634C20.2247 10.9518 19.7499 10.9445 19.4616 10.6471L16.75 7.8508L16.75 18C16.75 18.4142 16.4142 18.75 16 18.75C15.5858 18.75 15.25 18.4142 15.25 18L15.25 7.8508L12.5384 10.6471C12.2501 10.9445 11.7753 10.9518 11.4779 10.6634C11.1805 10.3751 11.1732 9.90025 11.4616 9.60289L15.4616 5.47789C15.6028 5.33222 15.7971 5.25 16 5.25ZM8 5.25C8.41421 5.25 8.75 5.58579 8.75 6L8.75 16.1492L11.4616 13.3529C11.7499 13.0555 12.2247 13.0482 12.5221 13.3366C12.8195 13.6249 12.8268 14.0997 12.5384 14.3971L8.53843 18.5221C8.39717 18.6678 8.20291 18.75 8 18.75C7.79709 18.75 7.60283 18.6678 7.46158 18.5221L3.46158 14.3971C3.17322 14.0997 3.18053 13.6249 3.47789 13.3366C3.77526 13.0482 4.25007 13.0555 4.53843 13.3529L7.25 16.1492L7.25 6C7.25 5.58579 7.58579 5.25 8 5.25Z"
                  fill="#000000"></path>
              </g>
            </svg></p>
        </th>
        <th class="px-2 py-3" align="center">Shape</th>
        <th class="px-2 py-3" align="center">Color</th>
        <th class="px-2 py-3" align="center">Clarity</th>
        <th class="px-2 py-3" align="center">Cut</th>
        <th class="px-2 py-3" align="center">Polish</th>
        <th class="px-2 py-3" align="center">Symm</th>
      </tr>
    </thead>

    <!-- Body -->
    <tbody>
      <tr *ngFor="let product of paginatedProducts" class="border-b border-d3d3d3 hover:bg-gray-50 whitespace-nowrap">
        <!-- Checkbox -->
        <td class="p-2" align="center">
          <input type="checkbox" class="w-4 h-4" />
        </td>

        <!-- Media Icons -->
        <td class="p-2" align="center">
          <div class="flex items-center justify-center gap-2">
            <!-- view product image -->
            <button *ngIf="product.imageUrl" (click)="openImagePopup(product.imageUrl)" class="cursor-pointer"
              title="View Product Images">
              <svg class="size-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    d="M18 4.25H6C5.27065 4.25 4.57118 4.53973 4.05546 5.05546C3.53973 5.57118 3.25 6.27065 3.25 7V17C3.25 17.7293 3.53973 18.4288 4.05546 18.9445C4.57118 19.4603 5.27065 19.75 6 19.75H18C18.7293 19.75 19.4288 19.4603 19.9445 18.9445C20.4603 18.4288 20.75 17.7293 20.75 17V7C20.75 6.27065 20.4603 5.57118 19.9445 5.05546C19.4288 4.53973 18.7293 4.25 18 4.25ZM6 5.75H18C18.3315 5.75 18.6495 5.8817 18.8839 6.11612C19.1183 6.35054 19.25 6.66848 19.25 7V15.19L16.53 12.47C16.4589 12.394 16.3717 12.3348 16.2748 12.2968C16.178 12.2587 16.0738 12.2427 15.97 12.25C15.865 12.2561 15.7622 12.2831 15.6678 12.3295C15.5733 12.3759 15.4891 12.4406 15.42 12.52L14.13 14.07L9.53 9.47C9.46222 9.39797 9.37993 9.34111 9.28858 9.30319C9.19723 9.26527 9.09887 9.24714 9 9.25C8.89496 9.25611 8.79221 9.28314 8.69776 9.32951C8.60331 9.37587 8.51908 9.44064 8.45 9.52L4.75 13.93V7C4.75 6.66848 4.8817 6.35054 5.11612 6.11612C5.35054 5.8817 5.66848 5.75 6 5.75ZM4.75 17V16.27L9.05 11.11L13.17 15.23L10.65 18.23H6C5.67192 18.23 5.35697 18.1011 5.12311 17.871C4.88926 17.6409 4.75525 17.328 4.75 17ZM18 18.25H12.6L16.05 14.11L19.2 17.26C19.1447 17.538 18.9951 17.7884 18.7764 17.9688C18.5577 18.1492 18.2835 18.2485 18 18.25Z"
                    fill="#2467FC"></path>
                </g>
              </svg>
            </button>
            <!-- view product video -->
            <button *ngIf="product.videoUrl" (click)="openVideoPopup(product.videoUrl)" class="cursor-pointer">
              <svg class="size-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <circle cx="12" cy="12" r="10" stroke="#2467FC" stroke-width="1.5"></circle>
                  <path
                    d="M15.4137 10.941C16.1954 11.4026 16.1954 12.5974 15.4137 13.059L10.6935 15.8458C9.93371 16.2944 9 15.7105 9 14.7868L9 9.21316C9 8.28947 9.93371 7.70561 10.6935 8.15419L15.4137 10.941Z"
                    stroke="#2467FC" stroke-width="1.5"></path>
                </g>
              </svg>
            </button>
            <!-- view cerificate -->
            <button class="cursor-pointer">
              <svg fill="#2467FC" class="size-5" viewBox="0 0 36 36" version="1.1" preserveAspectRatio="xMidYMid meet"
                xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
                <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                <g id="SVGRepo_iconCarrier">
                  <path
                    d="M32,6H4A2,2,0,0,0,2,8V28a2,2,0,0,0,2,2H19l.57-.7.93-1.14L20.41,28H4V8H32l0,8.56a8.41,8.41,0,0,1,2,1.81V8A2,2,0,0,0,32,6Z"
                    class="clr-i-outline clr-i-outline-path-1"></path>
                  <rect x="7" y="12" width="17" height="1.6" class="clr-i-outline clr-i-outline-path-2"></rect>
                  <rect x="7" y="16" width="11" height="1.6" class="clr-i-outline clr-i-outline-path-3"></rect>
                  <rect x="7" y="23" width="10" height="1.6" class="clr-i-outline clr-i-outline-path-4"></rect>
                  <path
                    d="M27.46,17.23a6.36,6.36,0,0,0-4.4,11l-1.94,2.37.9,3.61,3.66-4.46a6.26,6.26,0,0,0,3.55,0l3.66,4.46.9-3.61-1.94-2.37a6.36,6.36,0,0,0-4.4-11Zm0,10.68a4.31,4.31,0,1,1,4.37-4.31A4.35,4.35,0,0,1,27.46,27.91Z"
                    class="clr-i-outline clr-i-outline-path-5"></path>
                  <rect x="0" y="0" width="36" height="36" fill-opacity="0"></rect>
                </g>
              </svg>
            </button>
          </div>
        </td>

        <!-- Product ID -->
        <td class="p-2 text-2a82c4 font-medium">
          <a routerLink="/admin/product-details"
            class="cursor-pointer flex items-center justify-start gap-1.5 font-semibold">
            <svg width="10" height="11" viewBox="0 0 10 11" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="5" cy="5.5" r="5" fill="#4CAF50" />
            </svg>
            {{ product.id }}
          </a>
        </td>

        <!-- Product Name -->
        <td class="p-2 font-semibold text-868282">{{ product.name }}</td>

        <!-- Carat -->
        <td class="p-2 font-semibold text-323232" align="center">{{ product.carat }}</td>

        <!-- Shape -->
        <td class="p-2" align="center">
          <div class="size-12">
            <img class="size-full" [src]="product.shape" [alt]="product.name">
          </div>
        </td>

        <!-- Color -->
        <td class="p-2" align="center">
          <span class="p-2 text-xs lg:text-sm font-semibold border max-w-36 text-center block"
            [ngClass]="product.colorClass">
            {{ product.color }}
          </span>
        </td>

        <!-- Clarity -->
        <td class="p-2" align="center">
          <span class="p-2 text-xs lg:text-sm font-semibold border w-14 text-center block"
            [ngClass]="product.clarityClass">
            {{ product.clarity }}
          </span>
        </td>

        <!-- Cut -->
        <td class="p-2 text-xs lg:text-sm text-5c5a5a" align="center">{{ product.cut }}</td>

        <!-- Polish -->
        <td class="p-2 text-xs lg:text-sm text-5c5a5a" align="center">{{ product.polish }}</td>

        <!-- Symm -->
        <td class="p-2 text-xs lg:text-sm text-5c5a5a" align="center">{{ product.symm }}</td>
      </tr>
    </tbody>
  </table>
</div>
<!-- pagination -->
<div class="flex items-center justify-end gap-2 mt-6">
  <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1"
    class="px-2 py-0.5 rounded-md border border-gray-300 text-gray-600 disabled:opacity-50 hover:bg-gray-100">
    Prev
  </button>

  <ng-container *ngFor="let page of pages">
    <button (click)="changePage(page)" [ngClass]="{
        'bg-2a82c4 text-white': page === currentPage,
        'bg-white text-gray-600 border border-gray-300': page !== currentPage
      }" class="px-2 py-0.5 rounded-md hover:bg-blue-100">
      {{ page }}
    </button>
  </ng-container>

  <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages"
    class="px-2 py-0.5 rounded-md border border-gray-300 text-gray-600 disabled:opacity-50 hover:bg-gray-100">
    Next
  </button>
</div>


<!--View product images-->
<div *ngIf="isPopupOpen" (click)="closePopup()" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div (click)="$event.stopPropagation()" class="bg-white w-full max-w-xl mx-auto rounded-2xl shadow-lg relative">

    <!-- Close Button -->
    <button (click)="closePopup()"
      class="absolute top-1 right-1 text-gray-600 hover:text-black hover:bg-f9f9f9 px-2 py-1 rounded-md text-xl">
      ✕
    </button>

    <div class="p-4 md:p-6">
      <div *ngIf="popupType === 'image' && selectedImage">
        <!-- Main Image -->
        <div *ngIf="selectedImage" class="rounded-md overflow-hidden">
          <img [src]="selectedImage" alt="Selected Design" class="w-full object-cover rounded-lg">
        </div>

        <!-- Thumbnail Loop -->
        <div class="relative mt-2 flex items-center">
          <!-- Prev -->
          <button (click)="prevThumb()"
            class="flex items-center justify-center absolute size-5 xl:size-7 left-0 bg-gray-200 shadow rounded-full z-10">
            &#10094;
          </button>

          <div class="flex gap-2 mx-auto">
            <img *ngFor="let img of visibleThumbnails" (click)="selectImage(img)" [src]="img"
              class="size-12 xl:size-20 object-cover border rounded-md cursor-pointer flex-shrink-0"
              [ngClass]="selectedImage === img ? 'border-5c5a5a' : 'border-transparent'">
          </div>

          <!-- Next -->
          <button (click)="nextThumb()"
            class="flex items-center justify-center absolute size-5 xl:size-7 right-0 bg-gray-200 shadow rounded-full z-10">
            &#10095;
          </button>
        </div>
      </div>
      <div *ngIf="popupType === 'video' && selectedVideo">
        <!-- Main Video -->
        <div *ngIf="selectedVideo" class="rounded-md overflow-hidden">
          <video #mainVideo autoplay muted width="640" height="360" class="rounded-lg shadow-md">
            <source [src]="selectedVideo" type="video/mp4" />
          </video>
        </div>

        <!-- (Optional) Video Thumbnails -->
        <div class="relative mt-2 flex items-center" *ngIf="visibleVideoThumbnails.length">
          <!-- Prev -->
          <button (click)="prevVideoThumb()"
            class="flex items-center justify-center absolute size-5 xl:size-7 left-0 bg-gray-200 shadow rounded-full z-10">
            &#10094;
          </button>

          <div class="flex gap-2 mx-auto">
            <img *ngFor="let thumb of visibleVideoThumbnails" (click)="selectVideo(thumb)" [src]="thumb.thumb"
              class="size-12 xl:size-20 object-cover border rounded-md cursor-pointer flex-shrink-0"
              [ngClass]="selectedVideo === thumb.video ? 'border-5c5a5a' : 'border-transparent'">

          </div>

          <!-- Next -->
          <button (click)="nextVideoThumb()"
            class="flex items-center justify-center absolute size-5 xl:size-7 right-0 bg-gray-200 shadow rounded-full z-10">
            &#10095;
          </button>
        </div>

      </div>

    </div>
  </div>
</div>
