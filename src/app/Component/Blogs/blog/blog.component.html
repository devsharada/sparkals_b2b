<div class="w-full mx-auto py-5 lg:py-8 px-2 lg:px-5 xl:px-16">
  <app-breadcrumb [items]="[
    { label: 'Home', url: '/home' },
    { label: 'Blogs' },
  ]">
  </app-breadcrumb>

  <!-- section title -->
  <h1
    class="mt-3 text-center capitalize text-141313 font-normal text-lg/tight sm:text-2xl/tight lg:text-3xl/tight xl:text-5xl/tight">
    Blogs</h1>

  <div class="mt-4 sm:mt-6 md:mt-8">
    <div class="lg:flex items-start gap-2 lg:gap-4">
      <div class="w-full lg:w-3/4 mb-4 lg:mb-0">
        <!-- Latest Articles -->
        <h2
          class="clipped-box text-base sm:text-lg md:text-xl lg:text-2xl capitalize font-normal text-white tracking-[1.5px]">
          Latest Articles
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 lg:gap-3 mt-6 my-10">
          <div *ngFor="let items of paginatedBlogs" class="relative rounded-xl border border-d3d3d3 overflow-hidden">
            <a [routerLink]="items.link">
              <img class="w-full h-auto rounded-t-xl" [src]="items.img" [alt]="items.alt">
              <p
                class="bg-d3d3d3 py-1 px-3 text-center text-323232 text-xs md:text-sm absolute top-3 left-3 rounded-md">
                {{
                items.stone }}</p>
              <div class="p-4">
                <p class="line-clamp-2 text-323232 font-semibold text-sm md:text-base xl:text-lg mb-2">{{ items.title}}
                </p>
                <p class="line-clamp-2 text-868282 font-normal text-[13px] md:text-[15px] lg:text-[17px] mb-2">{{
                  items.content }}</p>
                <p class="flex items-center justify-end gap-1.5 text-323232 font-normal text-sm">
                  <svg class="size-4" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" fill="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                      <path fill="#454242"
                        d="M5.67326018,0 C6.0598595,0 6.37326018,0.31324366 6.37326018,0.699649298 L6.373,2.009 L13.89,2.009 L13.8901337,0.708141199 C13.8901337,0.321735562 14.2035343,0.00849190182 14.5901337,0.00849190182 C14.976733,0.00849190182 15.2901337,0.321735562 15.2901337,0.708141199 L15.29,2.009 L18,2.00901806 C19.1045695,2.00901806 20,2.90399995 20,4.00801605 L20,18.001002 C20,19.1050181 19.1045695,20 18,20 L2,20 C0.8954305,20 0,19.1050181 0,18.001002 L0,4.00801605 C0,2.90399995 0.8954305,2.00901806 2,2.00901806 L4.973,2.009 L4.97326018,0.699649298 C4.97326018,0.31324366 5.28666085,0 5.67326018,0 Z M1.4,7.742 L1.4,18.001002 C1.4,18.3322068 1.66862915,18.6007014 2,18.6007014 L18,18.6007014 C18.3313708,18.6007014 18.6,18.3322068 18.6,18.001002 L18.6,7.756 L1.4,7.742 Z M6.66666667,14.6186466 L6.66666667,16.284778 L5,16.284778 L5,14.6186466 L6.66666667,14.6186466 Z M10.8333333,14.6186466 L10.8333333,16.284778 L9.16666667,16.284778 L9.16666667,14.6186466 L10.8333333,14.6186466 Z M15,14.6186466 L15,16.284778 L13.3333333,16.284778 L13.3333333,14.6186466 L15,14.6186466 Z M6.66666667,10.6417617 L6.66666667,12.3078931 L5,12.3078931 L5,10.6417617 L6.66666667,10.6417617 Z M10.8333333,10.6417617 L10.8333333,12.3078931 L9.16666667,12.3078931 L9.16666667,10.6417617 L10.8333333,10.6417617 Z M15,10.6417617 L15,12.3078931 L13.3333333,12.3078931 L13.3333333,10.6417617 L15,10.6417617 Z M4.973,3.408 L2,3.40831666 C1.66862915,3.40831666 1.4,3.67681122 1.4,4.00801605 L1.4,6.343 L18.6,6.357 L18.6,4.00801605 C18.6,3.67681122 18.3313708,3.40831666 18,3.40831666 L15.29,3.408 L15.2901337,4.33697436 C15.2901337,4.72338 14.976733,5.03662366 14.5901337,5.03662366 C14.2035343,5.03662366 13.8901337,4.72338 13.8901337,4.33697436 L13.89,3.408 L6.373,3.408 L6.37326018,4.32848246 C6.37326018,4.7148881 6.0598595,5.02813176 5.67326018,5.02813176 C5.28666085,5.02813176 4.97326018,4.7148881 4.97326018,4.32848246 L4.973,3.408 Z">
                      </path>
                    </g>
                  </svg>{{ items.date }}
                </p>
                <button type="button"
                  class="mt-4 cursor-pointer w-full block rounded-full border border-323232 hover:bg-323232 hover:text-white text-lg md:text-xl py-2 px-5  bg-white text-323232 hover:shadow-md transition">
                  Read More
                </button>
              </div>
            </a>
          </div>
        </div>

        <!-- most popular -->
        <h2
          class="clipped-box text-base sm:text-lg md:text-xl lg:text-2xl capitalize font-normal text-white tracking-[1.5px]">
          Most Popular
        </h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-2 lg:gap-3 mt-6">
          <div *ngFor="let items of paginatedBlogs" class="relative rounded-xl border border-d3d3d3 overflow-hidden">
            <a [routerLink]="items.link">
              <img class="w-full h-auto rounded-t-xl" [src]="items.img" [alt]="items.alt">
              <p
                class="bg-d3d3d3 py-1 px-3 text-center text-323232 text-xs md:text-sm absolute top-3 left-3 rounded-md">
                {{
                items.stone }}</p>
              <div class="p-4">
                <p class="line-clamp-2 text-323232 font-semibold text-sm md:text-base xl:text-lg mb-2">{{ items.title}}
                </p>
                <p class="line-clamp-2 text-868282 font-normal text-[13px] md:text-[15px] lg:text-[17px] mb-2">{{
                  items.content }}</p>
                <p class="flex items-center justify-end gap-1.5 text-323232 font-normal text-sm">
                  <svg class="size-4" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" fill="#000000">
                    <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
                    <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
                    <g id="SVGRepo_iconCarrier">
                      <path fill="#454242"
                        d="M5.67326018,0 C6.0598595,0 6.37326018,0.31324366 6.37326018,0.699649298 L6.373,2.009 L13.89,2.009 L13.8901337,0.708141199 C13.8901337,0.321735562 14.2035343,0.00849190182 14.5901337,0.00849190182 C14.976733,0.00849190182 15.2901337,0.321735562 15.2901337,0.708141199 L15.29,2.009 L18,2.00901806 C19.1045695,2.00901806 20,2.90399995 20,4.00801605 L20,18.001002 C20,19.1050181 19.1045695,20 18,20 L2,20 C0.8954305,20 0,19.1050181 0,18.001002 L0,4.00801605 C0,2.90399995 0.8954305,2.00901806 2,2.00901806 L4.973,2.009 L4.97326018,0.699649298 C4.97326018,0.31324366 5.28666085,0 5.67326018,0 Z M1.4,7.742 L1.4,18.001002 C1.4,18.3322068 1.66862915,18.6007014 2,18.6007014 L18,18.6007014 C18.3313708,18.6007014 18.6,18.3322068 18.6,18.001002 L18.6,7.756 L1.4,7.742 Z M6.66666667,14.6186466 L6.66666667,16.284778 L5,16.284778 L5,14.6186466 L6.66666667,14.6186466 Z M10.8333333,14.6186466 L10.8333333,16.284778 L9.16666667,16.284778 L9.16666667,14.6186466 L10.8333333,14.6186466 Z M15,14.6186466 L15,16.284778 L13.3333333,16.284778 L13.3333333,14.6186466 L15,14.6186466 Z M6.66666667,10.6417617 L6.66666667,12.3078931 L5,12.3078931 L5,10.6417617 L6.66666667,10.6417617 Z M10.8333333,10.6417617 L10.8333333,12.3078931 L9.16666667,12.3078931 L9.16666667,10.6417617 L10.8333333,10.6417617 Z M15,10.6417617 L15,12.3078931 L13.3333333,12.3078931 L13.3333333,10.6417617 L15,10.6417617 Z M4.973,3.408 L2,3.40831666 C1.66862915,3.40831666 1.4,3.67681122 1.4,4.00801605 L1.4,6.343 L18.6,6.357 L18.6,4.00801605 C18.6,3.67681122 18.3313708,3.40831666 18,3.40831666 L15.29,3.408 L15.2901337,4.33697436 C15.2901337,4.72338 14.976733,5.03662366 14.5901337,5.03662366 C14.2035343,5.03662366 13.8901337,4.72338 13.8901337,4.33697436 L13.89,3.408 L6.373,3.408 L6.37326018,4.32848246 C6.37326018,4.7148881 6.0598595,5.02813176 5.67326018,5.02813176 C5.28666085,5.02813176 4.97326018,4.7148881 4.97326018,4.32848246 L4.973,3.408 Z">
                      </path>
                    </g>
                  </svg>{{ items.date }}
                </p>
                <button type="button"
                  class="mt-4 cursor-pointer w-full block rounded-full border border-323232 hover:bg-323232 hover:text-white text-lg md:text-xl py-2 px-5  bg-white text-323232 hover:shadow-md transition">
                  Read More
                </button>
              </div>
            </a>
          </div>
        </div>
        <!-- pagination -->
        <div class="flex items-center justify-end gap-2 mt-6">
          <button (click)="changePage(currentPage - 1)" [disabled]="currentPage === 1"
            class="px-2 py-0.5 rounded-md border border-gray-300 text-gray-600 disabled:opacity-50 hover:bg-gray-100">
            Prev
          </button>

          <ng-container *ngFor="let page of pages">
            <button (click)="changePage(page)" [ngClass]="{
        'bg-2a82c4 text-white': page === currentPage,
        'bg-white text-gray-600 border border-gray-300': page !== currentPage
      }" class="px-2 py-0.5 rounded-md hover:bg-blue-100">
              {{ page }}
            </button>
          </ng-container>

          <button (click)="changePage(currentPage + 1)" [disabled]="currentPage === totalPages"
            class="px-2 py-0.5 rounded-md border border-gray-300 text-gray-600 disabled:opacity-50 hover:bg-gray-100">
            Next
          </button>
        </div>
      </div>
      <div class="w-full lg:w-1/4">
        <app-trending-topics></app-trending-topics>
      </div>
    </div>

  </div>

</div>
