<div class="rounded-xl border border-d3d3d3 p-3">
  <h4 class="text-323232 text-xl md:text-2xl xl:text-3xl mb-4 flex items-center gap-2"><svg class="size-10"
      viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g id="SVGRepo_bgCarrier" stroke-width="0"></g>
      <g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g>
      <g id="SVGRepo_iconCarrier">
        <path d="M3 17L9 11L13 15L21 7M21 7V12M21 7H16" stroke="#000000" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round"></path>
      </g>
    </svg>Trending Topics</h4>
  <div *ngFor="let items of topics" class="border-l border-323232 p-2 mb-3">
    <a a [routerLink]="items.link">
      <p class="line-clamp-2 text-323232 font-semibold text-sm md:text-base mb-1">{{ items.title }}</p>
      <p class="text-868282 font-normal text-xs md:text-sm">{{ items.date }}</p>
    </a>
  </div>
</div>
