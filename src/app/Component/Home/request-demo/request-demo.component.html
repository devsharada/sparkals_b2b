<div class="w-full mx-auto py-5 lg:pt-8 lg:py-12 px-2 lg:px-5 xl:px-16 ">

  <div class="w-full bg-[url('/assets/images/home/demo-bg.png')] bg-cover bg-center rounded-2xl px-5 py-10 md:px-10 sm:py-20 flex flex-col sm:flex-row items-center justify-between">
    <div class="w-full sm:w-1/2">
      <p class="text-white capitalize font-normal text-center font-marcellus text-lg/tight sm:text-2xl/tight lg:text-3xl/tight xl:text-6xl/tight">Request for Demo</p>
      <p class="text-white font-normal text-center text-xs sm:text-sm lg:text-lg mt-2">See How Our Jewellery Platform Works — Live</p>
    </div>
    <div class="w-full sm:w-1/2 text-center mt-6 sm:mt-0">
      <button (click)="openAuth()"
        class="cursor-pointer bg-white text-323232 px-3 lg:px-6 py-2 sm:py-3 font-medium rounded-md hover:scale-100 capitalize text-sm sm:text-base xl:text-lg w-auto sm:w-48 lg:w-56 xl:w-60 mx-auto mt-4 sm:mt-0">Book Demo</button>
    </div>
  </div>
</div>

<app-auth [isOpen]="isAuthOpen" [activeTab]="activeAuthTab" (close)="closeAuth()"></app-auth>
