<div class="w-full mx-auto py-5 lg:py-8 px-2 lg:px-5 xl:px-16 flex flex-col items-center justify-center">
  <!-- section title -->
  <h6 class="text-center capitalize text-141313 font-normal text-lg/tight sm:text-2xl/tight lg:text-3xl/tight xl:text-6xl/tight">
    Benefits Of Partnering With Us</h6>
  <p class="text-center text-0000009e text-xs sm:text-sm lg:text-lg font-normal mt-2 w-full md:w-1/2">It’s about you and
    your family, having a comfortable payment, exceptional service and a lender.</p>

  <!-- benefits -->
  <div class="w-full lg:w-3/4 mx-auto grid grid-cols-2 sm:grid-cols-4 gap-2 lg:gap-4 xl:gap-6 mt-6 lg:mt-14">
    <div *ngFor="let benefit of benefits"
      class="text-center p-2 lg:p-4 bg-white border border-c241b678 rounded-lg shadow-md hover:shadow-lg transition-shadow duration-300">

      <img class="size-14 lg:size-20 mb-3 mx-auto" [src]="benefit.image" [alt]="benefit.title">

      <p class="text-sm lg:text-base xl:text-lg text-770b6d capitalize">
        {{ benefit.title }}
      </p>
    </div>
  </div>
</div>
