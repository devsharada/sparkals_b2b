<div class="w-full bg-c241b60d mx-auto py-5 lg:py-8 mb-2.5 lg:mb-4 px-2 lg:px-5 xl:px-16 sm:flex items-start justify-center border-y border-770b6d">
<div *ngFor="let feature of features" class="w-full sm:w-1/3 p-4 text-center">
  <img [src]="feature.icon" [alt]="feature.title" class="w-16 h-16 mb-4 mx-auto" />
  <p class="text-base lg:text-lg xl:text-xl text-323232 font-semibold capitalize">{{ feature.title }}</p>
  <p class="text-0000009e text-xs sm:text-sm lg:text-base font-normal mt-3">{{ feature.description }}</p>
</div>
</div>
