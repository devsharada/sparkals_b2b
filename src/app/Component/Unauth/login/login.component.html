<p class="text-2xl md:text-4xl font-normal text-center font-marcellus text-323232 mb-4">Login</p>

<form class="flex flex-col space-y-6 mt-5">
  <div class="relative">
    <input type="text"
      class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
      placeholder=" " />
    <label
      class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Your
      Name</label>
  </div>

  <div class="relative">
    <div class="relative">
      <input [type]="showPassword ? 'text' : 'password'"
        class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
        placeholder=" " />
      <label
        class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Password</label>
    </div>
    <!-- Eye Slash Icon (Hide password) -->
    <img *ngIf="!showPassword" (click)="togglePassword()" class="size-5 absolute top-3.5 right-3 cursor-pointer"
      src="/assets/images/home/eye-slash.png" alt="hide">

    <!-- Eye Icon (Show password) -->
    <img *ngIf="showPassword" (click)="togglePassword()" class="size-5 absolute top-3.5 right-3 cursor-pointer"
      src="/assets/images/home/eye.png" alt="show">
    <p (click)="onforgotPasswordClick()"
      class="cursor-pointer text-sm md:text-base font-normal text-770b6d text-right mt-1">Forgot Password</p>
  </div>

  <div class="flex items-center border border-c3c3c3">
    <div class="w-2/5">
      <img class="w-full h-full" src="/assets/images/home/captcha.png" alt="captcha">
    </div>
    <div class="relative w-3/5">
      <input type="text"
        class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
        placeholder=" " />
      <label
        class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Enter
        Captcha</label>
    </div>
  </div>

  <button
    class="mt-4 cursor-pointer w-max border border-323232 bg-323232 text-white text-lg md:text-xl py-2 px-5 mx-auto hover:bg-white hover:text-323232 transition">
    Submit
  </button>

  <div>
    <p class="text-sm md:text-base font-normal text-323232 text-center">New here? Create account now! <a
        class="text-14a155 font-bold cursor-pointer" (click)="onRegisterClick()">Register</a></p>
    <p class="flex items-center justify-center mt-3"><span class="bg-d3d3d3 w-30 h-[1px] block"></span><span
        class="mx-2 text-000000b2 text-lg font-medium">or</span><span class="bg-d3d3d3 w-30 h-[1px] block"></span></p>
  </div>
  <div class="flex items-center justify-center gap-6">
    <a routerLink="#"><img class="size-12" src="/assets/images/home/google.png" alt="google"></a>
    <a routerLink="#"><img class="size-12" src="/assets/images/home/facebook1.png" alt="facebook"></a>
    <a routerLink="#"><img class="size-12" src="/assets/images/home/apple.png" alt="apple"></a>
  </div>
</form>
