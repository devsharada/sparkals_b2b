<p class="text-2xl md:text-4xl font-normal text-center font-marcellus text-323232 mb-1.5">Forgot Password</p>
<p class="text-sm md:text-base font-normal text-323232 text-center mb-5">OTP will be send to registered mobile number</p>

<form class="flex flex-col space-y-6 mt-8">
  <div class="relative">
    <input type="text"
      class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
      placeholder=" " />
    <label
      class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Mobile
      No.</label>
  </div>

  <div class="flex items-center border border-c3c3c3">
    <div class="w-2/5">
      <img class="w-full h-full" src="/assets/images/home/captcha.png" alt="captcha">
    </div>
    <div class="relative w-3/5">
      <input type="text"
        class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
        placeholder=" " />
      <label
        class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Enter
        Captcha</label>
    </div>
  </div>

  <div class="flex items-center justify-between mt-4">
    <p class="text-center text-lg md:text-xl">
      <a class="text-323232 font-marcellus cursor-pointer" (click)="onLoginClick()">Back</a>
    </p>
    <button type="button" (click)="onVerifyOtpClick()"
      class=" cursor-pointer w-max border border-323232 bg-323232 text-white text-lg md:text-xl py-2 px-5 hover:bg-white hover:text-323232 transition">
      Submit
    </button>
  </div>
</form>
