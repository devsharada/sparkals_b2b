<p class="text-2xl md:text-4xl font-normal text-center font-marcellus text-323232 mb-4">Reset Password</p>

<form class="flex flex-col space-y-6 mt-5">
  <div class="relative">
    <input type="text"
      class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
      placeholder=" " />
    <label
      class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Email
      ID</label>
  </div>

  <div class="relative">
    <input type="password"
      class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
      placeholder=" " />
    <label
      class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">New
      Password</label>
  </div>

  <div class="relative">
    <input type="password"
      class="block px-2.5 pb-2 pt-4 w-full text-sm md:text-[15px] text-323232 bg-white  border-1 border-c3c3c3 appearance-none focus:outline-none focus:ring-0 focus:border-18ac67 peer"
      placeholder=" " />
    <label
      class="absolute text-base text-767676 duration-300 transform -translate-y-4 scale-75 top-2 z-10 origin-[0] bg-white  px-2 peer-focus:px-2  peer-placeholder-shown:scale-100 peer-placeholder-shown:-translate-y-1/2 peer-placeholder-shown:top-1/2 peer-focus:top-2 peer-focus:scale-75 peer-focus:-translate-y-4 rtl:peer-focus:translate-x-1/4 rtl:peer-focus:left-auto start-1">Confirm
      Password</label>
  </div>

  <button type="button" (click)="onLoginClick()"
    class="mt-4 cursor-pointer w-max border border-323232 bg-323232 text-white text-lg md:text-xl py-2 px-5 mx-auto hover:bg-white hover:text-323232 transition">
    Submit
  </button>

</form>
